services:
  postgres:
    image: postgres:16-alpine
    container_name: expressvisa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: expressvisa
      POSTGRES_PASSWORD: expressvisa
      POSTGRES_DB: expressvisa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expressvisa"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
